# Déploie la PWA EatWise (apps/eatwise/www/) sur GitHub Pages.
# Prérequis côté GitHub : Settings → Pages → Source = "GitHub Actions".
name: Deploy EatWise PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/eatwise/www/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/eatwise/www
      - id: deployment
        uses: actions/deploy-pages@v4
