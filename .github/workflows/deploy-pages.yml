# Déploie la PWA EatWise (apps/eatwise/www/) sur GitHub Pages.
# Active Pages automatiquement au premier run (enablement: true).
name: Deploy EatWise PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/eatwise/www/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/eatwise/www
      - id: deployment
        uses: actions/deploy-pages@v4
