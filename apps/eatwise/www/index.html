<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#3FBAA0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="EatWise" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>EatWise</title>
<style>
:root{
  --bg:#F5F6F7;--paper:#FFFFFF;--ink:#3B4249;--muted:#8A929A;
  --brand:#3FBAA0;--ochre:#F09A4E;--sport:#8B7BC7;--good:#7FC98B;--alert:#E2707B;--line:#ECEEF0;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding-bottom:40px}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}
.hdr{background:var(--brand);color:#FFFFFF;padding:26px 0 20px}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;opacity:.8}
.tagline{font-family:var(--serif);font-style:italic;font-size:15px;opacity:.85;margin-top:3px}
.h1{font-family:var(--serif);font-size:27px;margin:6px 0 4px;font-weight:600;line-height:1.12}
.sub{margin:0;font-size:13.5px;opacity:.85}
.tabs{display:flex;gap:6px;margin-top:16px;margin-bottom:16px;flex-wrap:wrap}
.tab{flex:1;min-width:70px;padding:12px 4px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--paper);color:var(--ink);font-family:var(--sans)}
.tab.on{border-color:var(--brand);background:var(--brand);color:#fff}
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(45,55,65,.05)}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.tile{border:none;border-radius:16px;padding:16px 8px 14px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);text-align:center}
.tile:active{transform:scale(.97)}
.tile .em{display:block;font-size:28px;margin-bottom:6px}
.row{display:flex;gap:10px;margin-bottom:14px}
.lab{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;display:block;font-weight:600}
.field{width:100%;padding:13px 12px;font-size:16px;border:1px solid var(--line);border-radius:12px;background:var(--paper);color:var(--ink);font-family:var(--sans);outline:none}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 12px;border-radius:999px;font-size:14px;cursor:pointer;border:1.5px solid var(--line);user-select:none;display:inline-block}
.btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.btn.dark{background:var(--ink);color:#fff}
.btn.alert{background:var(--alert);color:#fff}
.btn.ochre{background:var(--ochre);color:#fff}
.btn.sport{background:var(--sport);color:#fff}
.btn.brand{background:var(--brand);color:#fff;font-size:15px;padding:12px}
.btn.outline{background:transparent;border:1px solid var(--brand);color:var(--brand);font-size:15px;padding:12px}
.mt10{margin-top:10px}
.meta{font-family:var(--mono);font-size:13px;color:var(--muted)}
.tagpill{font-size:12px;padding:3px 8px;border-radius:999px;background:#F0F2F4;color:var(--muted)}
.tagpill.sport{background:#EFECFC;color:var(--sport)}
.delbtn{margin-top:8px;background:none;border:none;color:var(--alert);font-size:12.5px;cursor:pointer;padding:0;font-family:var(--sans)}
.sectitle{font-family:var(--serif);font-size:15px;color:var(--brand);font-weight:600;margin:4px 4px 8px}
.daytitle{font-family:var(--serif);font-size:15px;color:var(--brand);font-weight:600;margin:0 4px 8px;text-transform:capitalize}
.between{display:flex;justify-content:space-between}
.bar{height:10px;background:#EEF1F2;border-radius:999px;overflow:hidden}
.barfill{height:100%;border-radius:999px}
.daybars{display:flex;align-items:flex-end;gap:4px;height:102px;margin-top:6px}
.daycol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:3px}
.dayfill{width:100%;border-radius:3px 3px 0 0}
.dayx{font-size:9px;color:var(--muted)}
.foodrow{display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid var(--line)}
.muted{color:var(--muted)}
.center{text-align:center}
.note{font-size:13px;color:var(--muted);font-style:italic;margin-top:6px}
.modalbg{position:fixed;inset:0;background:rgba(35,48,46,.55);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
.modalbox{background:var(--paper);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow:auto;padding:18px}
.foot{max-width:560px;margin:20px auto 0;padding:0 16px;color:var(--muted);font-size:11.5px;line-height:1.5}
.cardhd{font-family:var(--serif);font-size:17px;font-weight:700;display:block;margin-bottom:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

var LS_KEY="eatwise-v3", VERSION="3.23.1", WINDOW_MS=4*60*60*1000;
var APP_NAME="EatWise";
var LLM_KEY="eatwise-llm";
var LLMS={
  claude:{name:"Claude",url:"https://claude.ai/new",q:true},
  chatgpt:{name:"ChatGPT",url:"https://chatgpt.com/",q:true},
  gemini:{name:"Gemini",url:"https://gemini.google.com/app",q:false},
  copy:{name:"Copier seulement",url:null,q:false}
};

var mem={};
var store={
  get:function(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in mem)?mem[k]:null; } },
  set:function(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
};

var SEV=[{v:0,label:"Aucune",color:"#7FC98B"},{v:1,label:"Léger",color:"#E7C04B"},{v:2,label:"Moyen",color:"#F09A4E"},{v:3,label:"Fort",color:"#E2707B"}];
var DEFAULT_LABELS={fast:"Ballonnement",daily:"Douleur",flag:"Raideur matinale",condition:"digestion (ballonnements) et douleurs de spondylarthrite ankylosante"};
function LBL(k){ return (state.labels&&state.labels[k])||DEFAULT_LABELS[k]; }
function lc(str){ str=String(str||""); return str.charAt(0).toLowerCase()+str.slice(1); }

function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowHM(){ return new Date().toTimeString().slice(0,5); }
function ts(e){ return new Date(e.date+"T"+(e.time||"12:00")).getTime(); }
function addDay(iso,n){ var d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function fmtDate(iso){ try{ return new Date(iso+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}); }catch(e){ return iso; } }
function median(a){ if(!a||!a.length) return null; var s=a.slice().sort(function(x,y){return x-y;}); var m=Math.floor(s.length/2); return s.length%2?s[m]:Math.round((s[m-1]+s[m])/2); }
function mean(a){ if(!a||!a.length) return null; var t=0; for(var i=0;i<a.length;i++) t+=a[i]; return Math.round((t/a.length)*10)/10; }
function uid(){ return Date.now()+"-"+Math.random().toString(36).slice(2,7); }
function slugify(s){ return (s||"eatwise").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")||"eatwise"; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

function normFood(s){ s=String(s||"").trim().replace(/\s+/g," "); if(!s) return ""; return s.charAt(0).toUpperCase()+s.slice(1).toLowerCase(); }
function tagsFromMeal(text){ var parts=String(text||"").split(/[,;\n]+/); var seen={}, out=[]; parts.forEach(function(p){ var t=normFood(p); if(t){ var k=t.toLowerCase(); if(!seen[k]){ seen[k]=1; out.push(t); } } }); return out; }
function tagPreviewText(text){ var t=tagsFromMeal(text); return t.length ? ("→ analysé comme : "+t.join(" · ")) : "Sépare les aliments par des virgules."; }

function loadAll(){ try{ var raw=store.get(LS_KEY); if(raw){ var p=JSON.parse(raw); return {entries:Array.isArray(p.entries)?p.entries:[], analysis:(p.analysis&&p.analysis.text)?p.analysis:null, history:Array.isArray(p.analysisHistory)?p.analysisHistory:[], labels:(p.labels&&typeof p.labels==="object"&&!Array.isArray(p.labels))?p.labels:{}}; } }catch(e){} return {entries:[], analysis:null, history:[], labels:{}}; }

var _init=loadAll();
var state={
  entries:_init.entries,
  analysis:_init.analysis,
  analysisHistory:_init.history,
  labels:_init.labels||{},
  tab:"log", kind:"meal",
  date:todayISO(), time:nowHM(),
  meal:"",
  sev:2, note:"",
  pain:0, stiff:false, pnote:"",
  snote:"", recipeNote:"", editId:null,
  llm:(function(){ var v=store.get(LLM_KEY); return LLMS[v]?v:"claude"; })(),
  showExport:false, copied:false, imp:""
};

function saveAll(){ try{ store.set(LS_KEY,JSON.stringify({entries:state.entries, analysis:state.analysis, analysisHistory:state.analysisHistory||[], labels:state.labels||{}})); }catch(e){} }
function persist(next){ state.entries=next; saveAll(); }

function saveEntry(entry){
  if(state.editId){ var eid=state.editId; persist(state.entries.map(function(e){ return e.id===eid?entry:e; })); state.editId=null; }
  else persist([entry].concat(state.entries));
}
function addMeal(){
  var tags=tagsFromMeal(state.meal);
  if(!state.meal.trim() && tags.length===0) return;
  saveEntry({id:state.editId||uid(),type:"meal",date:state.date,time:state.time,meal:state.meal.trim(),tags:tags});
  state.meal="";state.time=nowHM();state.tab="history"; render();
}
function addSymptom(){ saveEntry({id:state.editId||uid(),type:"symptom",date:state.date,time:state.time,sev:state.sev,note:state.note.trim()}); state.note="";state.time=nowHM();state.tab="history"; render(); }
function addSport(){ saveEntry({id:state.editId||uid(),type:"sport",date:state.date,time:state.time,note:state.snote.trim()}); state.snote="";state.time=nowHM();state.tab="history"; render(); }
function addPain(){
  var entry={id:state.editId||uid(),type:"pain",date:state.date,level:state.pain,stiff:state.stiff,note:state.pnote.trim()};
  var eid=state.editId;
  var rest=state.entries.filter(function(e){ return e.id!==eid && !(e.type==="pain"&&e.date===state.date); });
  persist([entry].concat(rest));
  state.editId=null; state.pnote="";state.tab="history"; render();
}
function removeEntry(id){ persist(state.entries.filter(function(e){return e.id!==id;})); render(); }
function repeatMeal(id){
  var src=null; for(var i=0;i<state.entries.length;i++){ if(state.entries[i].id===id){ src=state.entries[i]; break; } }
  if(!src||src.type!=="meal") return;
  persist([{id:uid(),type:"meal",date:todayISO(),time:nowHM(),meal:src.meal,tags:(src.tags||[]).slice()}].concat(state.entries));
  render();
}
function painLoggedToday(){ var t=todayISO(); for(var i=0;i<state.entries.length;i++){ var e=state.entries[i]; if(e.type==="pain"&&e.date===t) return true; } return false; }
function startEdit(id){
  var e=null; for(var i=0;i<state.entries.length;i++){ if(state.entries[i].id===id){ e=state.entries[i]; break; } }
  if(!e) return;
  state.editId=id; state.kind=e.type; state.date=e.date; state.time=e.time||nowHM();
  if(e.type==="meal"){ state.meal=e.meal||""; }
  else if(e.type==="symptom"){ state.sev=e.sev; state.note=e.note||""; }
  else if(e.type==="sport"){ state.snote=e.note||""; }
  else { state.pain=e.level||0; state.stiff=!!e.stiff; state.pnote=e.note||""; }
  state.tab="log"; render();
}
function cancelEdit(){ state.editId=null; state.meal=""; state.note=""; state.snote=""; state.pnote=""; render(); }

function buildExport(){
  var prev="";
  if(state.analysis && state.analysis.text){
    prev="ANALYSE PRÉCÉDENTE (rédigée par toi, Claude, le "+state.analysis.date+", d'après les seules données connues alors. Elle peut être partielle ou dépassée : reconsidère-la à la lumière des données à jour ci-dessous, ne la reprends pas telle quelle) :\n"+state.analysis.text+"\n\n";
  }
  var b=computeBloat(state.entries), p=computePain(state.entries), sum=[];
  if(b.avgDelay!=null) sum.push("- Délai médian déclencheur -> "+lc(LBL("fast"))+" : ~"+b.avgDelay+" min");
  b.suspects.slice(0,8).forEach(function(s){ sum.push("- "+s.name+" : "+s.bad+"/"+s.total+" prises suivies d'un épisode ("+Math.round(s.rate*100)+"%"+(s.med!=null?", délai médian ~"+s.med+" min":"")+")"); });
  if(p.overall!=null) sum.push("- "+LBL("daily")+" moyenne : "+p.overall+"/10 sur "+p.count+" jours notés");
  p.foods.slice(0,8).forEach(function(f){ sum.push("- "+f.name+" mangé la veille/avant-veille : "+lc(LBL("daily"))+" "+f.avgWith+" vs "+f.avgWithout+" sans ("+(f.delta>0?"+":"")+f.delta+", "+f.n+" jours)"); });
  var summary=sum.length?("RÉSUMÉ CALCULÉ PAR L'APP (indicatif, à recouper avec les données brutes) :\n"+sum.join("\n")+"\n\n"):"";
  return "Adopte la posture d'un expert en nutrition clinique et en médecine des maladies chroniques (base : gastro-entérologie, immunologie et maladies auto-immunes/inflammatoires). Ma situation : "+LBL("condition")+". Mes suivis : symptôme rapide « "+LBL("fast")+" », suivi quotidien « "+LBL("daily")+" » (0 à 10) avec indicateur du matin « "+lc(LBL("flag"))+" ».\n"
+"PREMIÈRE TÂCHE : identifie la ou les spécialités médicales pertinentes d'après ces intitulés (ex. rhumatologie pour des douleurs articulaires, dermatologie pour rougeurs ou eczéma, gastro-entérologie pour la digestion) et cible tes raisonnements et tes sources en conséquence. Appuie-toi sur les données scientifiques établies ; si tu disposes de la recherche web, vérifie et cite de vraies sources récentes (ex. PubMed) — sinon n'invente AUCUNE référence et dis-le clairement. Ceci reste un suivi personnel, pas un avis médical : formule des hypothèses et des expériences prudentes à tester, jamais des prescriptions.\n\n"
+"Voici les données de mon carnet de suivi. Analyse-les.\n\n"
+"STRUCTURE — un tableau \"entries\", chaque entrée a un champ \"type\" :\n"
+"- type \"meal\"    : {date, time, meal (texte libre), tags (aliments détectés automatiquement, un par ingrédient), sport (booléen hérité, ancien flag)}\n"
+"- type \"sport\"   : {date, time, note}. Effort physique horodaté — peut couper la digestion et déclencher un ballonnement (traité comme un déclencheur, au même titre qu'un repas).\n"
+"- type \"symptom\" : symptôme rapide « "+LBL("fast")+" ». {date, time, sev : 0=aucune gêne (observation explicite d'absence de symptôme) 1=léger 2=moyen 3=fort, note}\n"
+"- type \"pain\"    : suivi quotidien « "+LBL("daily")+" ». {date, level : 0 à 10, stiff : « "+lc(LBL("flag"))+" » true/false, note}\n\n"
+summary
+"CE QUE JE CHERCHE :\n"
+"1) "+LBL("fast")+"s : déclencheurs suspects (aliments ET sport), délai typique déclencheur -> symptôme, combinaisons à risque.\n"
+"2) "+LBL("daily")+" (réaction lente) : lien entre l'alimentation de la VEILLE et de l'AVANT-VEILLE et le niveau quotidien / « "+lc(LBL("flag"))+" ». Le ressenti du matin reflète surtout les repas des jours précédents, PAS ceux du jour même — ne les associe pas.\n\n"
+"MÉTHODE :\n"
+"- Distingue corrélation et causalité ; pour chaque hypothèse, donne un niveau de confiance (faible/moyen/élevé) et le nombre d'observations qui la soutiennent.\n"
+"- Pour les symptômes rapides, raisonne aussi par familles d'aliments (FODMAP si pertinent, fermentescibles, alcool et boissons gazeuses, gras, sport post-prandial), pas seulement aliment par aliment.\n"
+"- Ne conclus jamais sur moins de 3 observations ; dis explicitement quand les données ne suffisent pas encore.\n"
+"- Signale tout signal d'alerte qui mérite une consultation (perte de poids, sang, douleur nocturne inhabituelle, fièvre...).\n\n"
+"CE QUE TU DOIS ME RENVOYER — deux parties distinctes :\n"
+"PARTIE 1 — Une explication en clair, en SÉPARANT nettement :\n"
+"   - "+LBL("fast").toUpperCase()+" : déclencheurs suspects, délai typique, combinaisons, rôle du sport — avec niveau de confiance.\n"
+"   - "+LBL("daily").toUpperCase()+" : liens éventuels avec l'alimentation de la veille / avant-veille, en tenant compte du décalage — avec niveau de confiance.\n"
+"   - SUGGESTIONS : des pistes concrètes et actionnables — quoi essayer, quoi limiter ou décaler — formulées comme des expériences prudentes à tester (durée en jours, quoi noter pour pouvoir conclure), jamais comme des prescriptions médicales.\n"
+"   Reste prudent (hypothèses, jamais de causalité affirmée), signale les limites des données, propose des tests concrets. Ne propose PAS de recettes ici : l'app a un circuit dédié pour ça.\n"
+"PARTIE 2 — Un petit JSON contenant UNIQUEMENT l'analyse (surtout PAS les entrées), à coller dans l'app (onglet Analyse, zone « Puis colle la réponse ici »). Format exact :\n"
+"   {\"analysis\": {\"date\": \""+todayISO()+"\", \"text\": \"<synthèse CONDENSÉE>\"}}\n"
+"   - Dans \"text\", structure avec des titres '## ' (ex. '## "+LBL("fast")+"s', '## "+LBL("daily")+"', '## Suggestions', '## Tests', '## Limites') et des puces '- ' ; sépare bien les deux types de symptômes ; les retours à la ligne s'écrivent \\n.\n"
+"   - L'app remplace l'analyse et garde mes données intactes.\n\n"
+prev
+"DONNÉES (JSON) :\n"+JSON.stringify({entries:state.entries, analysis:state.analysis},null,2);
}

function copyExport(){
  var txt=buildExport();
  function done(ok){ state.copied=ok; render(); }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){done(true);}).catch(function(){ fallback(); });
  } else { fallback(); }
  function fallback(){
    try{ var ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.top="0"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); var ok=document.execCommand("copy"); document.body.removeChild(ta); done(!!ok); }catch(e){ done(false); }
  }
}
function applyImport(parsed){
  if(Array.isArray(parsed)){ state.entries=parsed; saveAll(); render(); alert("Importé : "+parsed.length+" entrées."); return; }
  if(parsed && typeof parsed==="object"){
    var msg=[];
    if(Array.isArray(parsed.entries)){ state.entries=parsed.entries; msg.push(parsed.entries.length+" entrées"); }
    if("analysis" in parsed){ var a=parsed.analysis; var na=(a&&a.text)?{text:a.text,date:a.date||todayISO()}:null; if(na&&state.analysis&&state.analysis.text&&state.analysis.text!==na.text){ state.analysisHistory=[state.analysis].concat(state.analysisHistory||[]).slice(0,10); } state.analysis=na; msg.push("analyse"); }
    if(Array.isArray(parsed.analysisHistory)){ state.analysisHistory=parsed.analysisHistory.slice(0,10); }
    if(parsed.labels&&typeof parsed.labels==="object"&&!Array.isArray(parsed.labels)){ state.labels=parsed.labels; }
    if(msg.length){ saveAll(); render(); alert("Importé : "+msg.join(" + ")+"."); return; }
  }
  alert("Format inattendu.");
}
function extractJSON(raw){
  raw=String(raw==null?"":raw).trim();
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(e){}
  for(var i=0;i<raw.length;i++){
    if(raw.charAt(i)!=="{") continue;
    var depth=0,inStr=false,escp=false;
    for(var j=i;j<raw.length;j++){
      var c=raw.charAt(j);
      if(inStr){ if(escp){ escp=false; } else if(c==="\\"){ escp=true; } else if(c==="\""){ inStr=false; } }
      else if(c==="\""){ inStr=true; }
      else if(c==="{"){ depth++; }
      else if(c==="}"){ depth--; if(depth===0){ var cand=raw.slice(i,j+1); if(cand.indexOf("\"analysis\"")>=0||cand.indexOf("\"entries\"")>=0){ try{ return JSON.parse(cand); }catch(e2){} } break; } }
    }
  }
  return null;
}
function importJSON(){
  var raw=(state.imp||"").trim(); if(!raw) return;
  var d=extractJSON(raw);
  if(d==null){ alert("Je n'ai pas trouvé d'analyse dans ce texte. Colle la réponse complète de Claude (ou son bloc {\"analysis\": ...})."); return; }
  state.imp=""; applyImport(d);
}
function copyAndOpenLLM(txt){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt); }
    else { var ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.top="0"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }
  }catch(e){}
  var l=LLMS[state.llm]||LLMS.claude;
  if(!l.url){ alert("Ton rapport est copié — colle-le dans l'IA de ton choix."); return; }
  var url=l.url;
  if(l.q){ var q=encodeURIComponent(txt); if(q.length<6000) url+=(url.indexOf("?")>=0?"&":"?")+"q="+q; }
  window.open(url,"_blank");
}
function llmChipsHTML(){
  return '<div class="chips" style="margin:0 0 12px">'+["claude","chatgpt","gemini","copy"].map(function(k){ var on=state.llm===k; return '<span class="chip" data-act="llm" data-val="'+k+'" style="font-size:13px;'+chipStyle(on,"var(--brand)")+'">'+LLMS[k].name+'</span>'; }).join("")+'</div>';
}
function sendToClaude(){ copyAndOpenLLM(buildExport()); }
function buildRecipePrompt(kind){
  var labels={dejeuner:"déjeuner (petit-déjeuner) rapide à préparer",diner:"dîner (repas de midi)",souper:"souper (repas du soir)"};

function computeBloat(entries){
  var triggers=[];
  entries.forEach(function(e){
    if(e.type==="meal"){ var tags=(e.tags||[]).slice(); if(e.sport) tags.push("Sport"); triggers.push({t:ts(e),tags:tags}); }
    else if(e.type==="sport"){ triggers.push({t:ts(e),tags:["Sport"]}); }
  });
  var sy=entries.filter(function(e){return e.type==="symptom"&&e.sev>=2;});
  var stat={}, all=[];
  triggers.forEach(function(m){
    var mt=m.t, best=null;
    sy.forEach(function(s){ var st=ts(s); if(st>mt && st-mt<=WINDOW_MS && (best==null||st<best)) best=st; });
    var d=best!=null?Math.round((best-mt)/60000):null; if(d!=null) all.push(d);
    m.tags.forEach(function(t){ stat[t]=stat[t]||{name:t,total:0,bad:0,delays:[]}; stat[t].total++; if(best!=null){ stat[t].bad++; if(d!=null) stat[t].delays.push(d); } });
  });
  var suspects=Object.keys(stat).map(function(k){return stat[k];}).filter(function(s){return s.total>=2;}).map(function(s){ return {name:s.name,total:s.total,bad:s.bad,rate:s.bad/s.total,med:median(s.delays)}; }).sort(function(a,b){return b.rate-a.rate||b.bad-a.bad||b.total-a.total;});
  return {suspects:suspects, avgDelay:median(all)};
}
function computePain(entries){
  var pains=entries.filter(function(e){return e.type==="pain"&&typeof e.level==="number";});
  var painByDay={}; pains.forEach(function(p){ painByDay[p.date]=p.level; });
  var tagsByDay={}; entries.filter(function(e){return e.type==="meal";}).forEach(function(m){ tagsByDay[m.date]=tagsByDay[m.date]||{}; (m.tags||[]).forEach(function(t){ tagsByDay[m.date][t]=true; }); });
  var overall=mean(pains.map(function(p){return p.level;}));
  var allTags={}; entries.filter(function(e){return e.type==="meal";}).forEach(function(m){ (m.tags||[]).forEach(function(t){ allTags[t]=true; }); });
  var foodStat={};
  Object.keys(allTags).forEach(function(t){
    var w=[], wo=[];
    Object.keys(painByDay).forEach(function(day){
      var p1=addDay(day,-1), p2=addDay(day,-2);
      var ate=(tagsByDay[p1]&&tagsByDay[p1][t])||(tagsByDay[p2]&&tagsByDay[p2][t]);
      (ate?w:wo).push(painByDay[day]);
    });
    if(w.length>=3) foodStat[t]={name:t,avgWith:mean(w),avgWithout:mean(wo),n:w.length};
  });
  var foods=Object.keys(foodStat).map(function(k){return foodStat[k];}).filter(function(f){return f.avgWithout!=null;}).map(function(f){ f.delta=Math.round((f.avgWith-f.avgWithout)*10)/10; return f; }).sort(function(a,b){return b.delta-a.delta;});
  var days=[]; for(var i=13;i>=0;i--){ var d=new Date(); d.setDate(d.getDate()-i); var iso=d.toISOString().slice(0,10); days.push({iso:iso,level:painByDay[iso]!=null?painByDay[iso]:null}); }
  return {overall:overall,foods:foods,days:days,count:pains.length};
}
function computeStiff(entries){
  var pains=entries.filter(function(e){return e.type==="pain";});
  var stiffByDay={}; pains.forEach(function(p){ stiffByDay[p.date]=!!p.stiff; });
  var tagsByDay={}; entries.filter(function(e){return e.type==="meal";}).forEach(function(m){ tagsByDay[m.date]=tagsByDay[m.date]||{}; (m.tags||[]).forEach(function(t){ tagsByDay[m.date][t]=true; }); });
  var allTags={}; entries.filter(function(e){return e.type==="meal";}).forEach(function(m){ (m.tags||[]).forEach(function(t){ allTags[t]=true; }); });
  var days=Object.keys(stiffByDay), stiffDays=0;
  days.forEach(function(d){ if(stiffByDay[d]) stiffDays++; });
  var foods=[];
  Object.keys(allTags).forEach(function(t){
    var w=[], wo=[];
    days.forEach(function(day){
      var p1=addDay(day,-1), p2=addDay(day,-2);
      var ate=(tagsByDay[p1]&&tagsByDay[p1][t])||(tagsByDay[p2]&&tagsByDay[p2][t]);
      (ate?w:wo).push(stiffByDay[day]?1:0);
    });
    if(w.length>=3 && wo.length){
      var sum=function(a){ var s=0; for(var i=0;i<a.length;i++) s+=a[i]; return s; };
      var rw=Math.round(100*sum(w)/w.length), rwo=Math.round(100*sum(wo)/wo.length);
      foods.push({name:t,rateWith:rw,rateWithout:rwo,delta:rw-rwo,n:w.length});
    }
  });
  foods.sort(function(a,b){return b.delta-a.delta;});
  return {count:days.length, stiffDays:stiffDays, foods:foods};
}
function groupEntries(entries){
  var g={}; entries.forEach(function(e){ (g[e.date]=g[e.date]||[]).push(e); });
  Object.keys(g).forEach(function(k){ g[k].sort(function(a,b){ var pa=a.type==="pain"?1:0, pb=b.type==="pain"?1:0; return pb-pa||ts(b)-ts(a); }); });
  return Object.keys(g).map(function(k){return [k,g[k]];}).sort(function(a,b){return a[0]<b[0]?1:-1;});
}

function renderAnalysis(txt){
  var lines=String(txt||"").split("\n"), html="", inList=false;
  function closeList(){ if(inList){ html+="</ul>"; inList=false; } }
  lines.forEach(function(raw){
    var line=raw.trim();
    if(!line){ closeList(); return; }
    var mh=line.match(/^#{1,3}\s+(.*)$/);
    if(mh){ closeList(); html+='<div style="font-family:var(--serif);font-size:14.5px;font-weight:700;color:var(--brand);margin:12px 0 4px">'+esc(mh[1])+'</div>'; return; }
    if(/^[-•*]\s+/.test(line)){ if(!inList){ html+='<ul style="margin:4px 0 6px 2px;padding-left:18px">'; inList=true; } html+='<li style="margin:3px 0;font-size:13px;line-height:1.45">'+esc(line.replace(/^[-•*]\s+/,""))+'</li>'; return; }
    closeList();
    html+='<div style="margin:4px 0;font-size:13px;line-height:1.45">'+esc(line)+'</div>';
  });
  closeList();
  return html;
}

  if(state.analysisHistory && state.analysisHistory.length){

    claudeBlock+='<div class="card"><span class="cardhd" style="font-size:15px">Analyses précédentes</span>'+hist+'</div>';
  }
  var h='<div class="sectitle">'+LBL("fast")+'s</div>';
  if(b.avgDelay!=null) h+='<div class="card" style="background:var(--brand);color:#FFFFFF;border:none"><div style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;opacity:.85">Délai typique</div><div style="font-family:var(--serif);font-size:26px;font-weight:600">≈ '+b.avgDelay+' min après le déclencheur</div></div>';
  if(b.suspects.length===0) h+='<div class="card center muted">Continue d\'enregistrer tes repas et ton ressenti.</div>';
  b.suspects.forEach(function(s){ var col=s.rate>=.6?"var(--alert)":s.rate>=.3?"var(--ochre)":"var(--good)";
    h+='<div class="card" style="padding:14px;margin-bottom:10px"><div class="between" style="margin-bottom:8px"><b>'+esc(s.name)+'</b><span class="meta">'+s.bad+'/'+s.total+' · '+Math.round(s.rate*100)+'%'+(s.med!=null?' · ~'+s.med+'min':'')+'</span></div><div class="bar"><div class="barfill" style="width:'+Math.max(4,s.rate*100)+'%;background:'+col+'"></div></div></div>';
  });
  h+='<div class="sectitle" style="margin-top:18px">'+LBL("daily")+' (suivi quotidien)</div>';
  if(p.count===0){ h+='<div class="card center muted">Note ton ressenti chaque jour pour voir la courbe et les liens.</div>'; return h+claudeBlock; }
  var topSus={}; b.suspects.forEach(function(s){ if(s.rate>=0.5&&s.total>=2) topSus[s.name]=1; });
  var symByDay={}, susByDay={};
  state.entries.forEach(function(e){ if(e.type==="symptom"&&e.sev>=2){ symByDay[e.date]=1; } else if(e.type==="meal"){ (e.tags||[]).forEach(function(t){ if(topSus[t]) susByDay[e.date]=1; }); } });
  var mkRow='<div style="display:flex;gap:4px;margin-left:24px;height:12px;font-size:8px;line-height:12px">'+p.days.map(function(d){ return '<div style="flex:1;text-align:center">'+(symByDay[d.iso]?'<span style="color:var(--ochre)">●</span>':'')+(susByDay[d.iso]?'<span style="color:var(--brand)">◆</span>':'')+'</div>'; }).join("")+'</div>';
  var barCols=p.days.map(function(d){ return '<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:80px">'+(d.level==null?'<div style="width:100%;height:2px;background:#E8EBED"></div>':'<div class="dayfill" style="width:100%;height:'+Math.max(2,d.level*8)+'px;background:var(--alert)"></div>')+'</div>'; }).join("");
  var dateRow='<div style="display:flex;gap:4px;margin-left:24px;margin-top:2px">'+p.days.map(function(d){ return '<div style="flex:1;text-align:center"><span class="dayx">'+d.iso.slice(8,10)+'</span></div>'; }).join("")+'</div>';
  h+='<div class="card"><div style="font-size:12.5px;color:var(--muted);margin-bottom:6px">'+LBL("daily")+' des 14 derniers jours (échelle 0 à 10) · moyenne '+(p.overall!=null?p.overall:"—")+'/10</div>'
   +mkRow
   +'<div style="display:flex;gap:6px"><div style="width:18px;display:flex;flex-direction:column;justify-content:space-between;height:80px;font-size:9px;color:var(--muted);text-align:right;line-height:1"><span>10</span><span>5</span><span>0</span></div>'
   +'<div style="flex:1;position:relative"><div style="position:absolute;left:0;right:0;top:0;border-top:1px dashed var(--line)"></div><div style="position:absolute;left:0;right:0;top:40px;border-top:1px dashed var(--line)"></div><div style="position:absolute;left:0;right:0;bottom:0;border-top:1px solid var(--line)"></div><div style="display:flex;align-items:flex-end;gap:4px;height:80px">'+barCols+'</div></div></div>'
   +dateRow
   +'<div class="muted" style="font-size:11px;margin-top:8px">Barres : douleur quotidienne, de 0 à 10 (trait gris = jour non renseigné). Rangée du dessus, échelle distincte (présence/absence) : <span style="color:var(--ochre)">●</span> '+lc(LBL("fast"))+' modéré ou fort · <span style="color:var(--brand)">◆</span> repas contenant un aliment suspect.</div></div>';
  if(p.foods.length>0){

    h+='<div class="card"><div style="font-size:13px;color:var(--muted);margin-bottom:10px">'+LBL("daily")+' moyenne les jours où l\'aliment a été mangé <b>la veille ou l\'avant-veille</b>, contre les autres jours. La réaction étant lente, les repas du jour même sont ignorés. Écart positif = piste à surveiller.</div>'+rows+'</div>';
  } else {
    h+='<div class="card center muted">Continue d\'enregistrer tes repas et ton ressenti (min. 3 jours par aliment).</div>';
  }
  var st=computeStiff(state.entries);
  if(st.count>=3){
    h+='<div class="card"><div style="font-size:13px;margin-bottom:6px"><b>'+LBL("flag")+'</b> <span class="muted">· '+st.stiffDays+' matin'+(st.stiffDays>1?"s":"")+' raide'+(st.stiffDays>1?"s":"")+' sur '+st.count+' notés</span></div>';
    if(st.foods.length){ h+='<div class="muted" style="font-size:12px;margin-bottom:6px">Part des matins « '+lc(LBL("flag"))+' » quand l\'aliment a été mangé la veille ou l\'avant-veille, contre sans.</div>'+st.foods.map(function(f){ var col=f.delta>=20?"var(--alert)":f.delta<=-20?"var(--good)":"var(--muted)"; var sign=f.delta>0?"+":""; return '<div class="foodrow"><span>'+esc(f.name)+' <span class="muted" style="font-size:12px">('+f.n+'j)</span></span><span class="meta"><b style="color:'+col+'">'+sign+f.delta+' pts</b> <span class="muted">('+f.rateWith+'% vs '+f.rateWithout+'%)</span></span></div>'; }).join(""); }
    else { h+='<div class="muted" style="font-size:12.5px">Pas encore assez de jours par aliment (min. 3).</div>'; }
    h+='</div>';
  }
  h+='<div class="card muted" style="font-size:12px">Liens indicatifs et bruités : les symptômes chroniques évoluent par poussées. À croiser avec ton médecin.</div>';
  return h+claudeBlock;
}

var app=document.getElementById("app");
app.addEventListener("click",function(e){
  if(e.target.id==="modalbg"){ state.showExport=false; render(); return; }
  if(e.target.id==="exporttext"){ e.target.select(); return; }
  var el=e.target.closest("[data-act]"); if(!el) return;
  var act=el.getAttribute("data-act"), val=el.getAttribute("data-val");
  if(act==="tab"){ state.tab=val; render(); }
  else if(act==="kind"){ state.editId=null; state.kind=val; render(); }
  else if(act==="sev"){ state.sev=+val; render(); }
  else if(act==="stiff"){ state.stiff=!state.stiff; render(); }
  else if(act==="addMeal"){ addMeal(); }
  else if(act==="addSymptom"){ addSymptom(); }
  else if(act==="addSport"){ addSport(); }
  else if(act==="addPain"){ addPain(); }
  else if(act==="del"){ removeEntry(val); }
  else if(act==="again"){ repeatMeal(val); }
  else if(act==="edit"){ startEdit(val); }
  else if(act==="cancelEdit"){ cancelEdit(); }
  else if(act==="report"){ openReport(); }
  else if(act==="sendClaude"){ sendToClaude(); }
  else if(act==="recipe"){ sendRecipe(val); }
  else if(act==="llm"){ state.llm=val; store.set(LLM_KEY,val); render(); }
  else if(act==="openExport"){ state.showExport=true; state.copied=false; render(); }
  else if(act==="closeExport"){ state.showExport=false; render(); }
  else if(act==="copy"){ copyExport(); }
  else if(act==="download"){ downloadBackup(); }
  else if(act==="importText"){ importJSON(); }
});
app.addEventListener("input",function(e){
  var el=e.target.closest("[data-field]"); if(!el) return;
  var f=el.getAttribute("data-field");
  if(f==="pain"){ state.pain=+el.value; var pv=document.getElementById("painval"); if(pv) pv.textContent=el.value; return; }
  if(f==="meal"){ state.meal=el.value; var tp=document.getElementById("tagpreview"); if(tp) tp.textContent=tagPreviewText(el.value); return; }
  if(f==="lblFast"||f==="lblDaily"||f==="lblFlag"||f==="lblCond"){ var lk={lblFast:"fast",lblDaily:"daily",lblFlag:"flag",lblCond:"condition"}[f]; state.labels=state.labels||{}; if(el.value.trim()){ state.labels[lk]=el.value.trim(); } else { delete state.labels[lk]; } saveAll(); return; }
  state[f]=el.value;
});
app.addEventListener("change",function(e){
  var el=e.target.closest("[data-field]"); if(!el) return;
  var df=el.getAttribute("data-field");
  if(df==="file"){ importFile(el); return; }
  if(df==="lblFast"||df==="lblDaily"||df==="lblFlag"||df==="lblCond"){ render(); }
});

render();
</script>
